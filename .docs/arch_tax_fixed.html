<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Protocol Communication Fabric - Architecture Taxonomy</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e4e4ef;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .sidebar {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #06b6d4;
        }
        
        .layer-item, .domain-item {
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        
        .layer-item:hover, .domain-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }
        
        .layer-item.active {
            border-left-color: #7c3aed;
            background: rgba(124, 58, 237, 0.2);
        }
        
        .layer-name {
            font-weight: 600;
            font-size: 1rem;
        }
        
        .layer-stats {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 5px;
        }
        
        .main-content {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .chart-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-wrapper {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
        }
        
        .chart-wrapper h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #06b6d4;
            text-align: center;
        }
        
        #mermaid-diagram {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
            margin-top: 20px;
        }
        
        .detail-panel {
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .detail-panel h3 {
            color: #7c3aed;
            margin-bottom: 15px;
        }
        
        .node-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .severity-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .severity-critical { background: #dc2626; color: white; }
        .severity-high { background: #ea580c; color: white; }
        .severity-medium { background: #ca8a04; color: white; }
        .severity-low { background: #16a34a; color: white; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Multi-Protocol Communication Fabric</h1>
            <p class="subtitle">Architectural Taxonomy Dashboard - OSI L3 → L7</p>
        </header>
        
        <div class="dashboard">
            <div class="sidebar">
                <h2>📡 OSI Layers</h2>
                <div id="layers-list"></div>
                
                <h2 style="margin-top: 20px;">🔧 Cross-Cutting</h2>
                <div id="domains-list"></div>
            </div>
            
            <div class="main-content">
                <div class="chart-container">
                    <div class="chart-wrapper">
                        <h3>Issues by Layer</h3>
                        <canvas id="layerChart"></canvas>
                    </div>
                    <div class="chart-wrapper">
                        <h3>Severity Distribution</h3>
                        <canvas id="severityChart"></canvas>
                    </div>
                </div>
                
                <div id="mermaid-diagram" class="mermaid">
                    Loading diagram...
                </div>
            </div>
        </div>
        
        <div class="detail-panel" id="detail-panel">
            <h3>Select a layer or domain to view details</h3>
            <div id="node-details"></div>
        </div>
    </div>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            darkMode: true,
            securityLevel: 'loose'
        });

        // Load taxonomy data
        fetch('architecture_taxonomy.json')
            .then(r => r.json())
            .then(data => {
                renderLayers(data);
                renderCharts(data);
                renderDiagram();
            })
            .catch(() => {
                document.getElementById('layers-list').innerHTML = '<p class="loading">Loading taxonomy...</p>';
            });

        function renderLayers(data) {
            const layersList = document.getElementById('layers-list');
            const domainsList = document.getElementById('domains-list');
            
            let layersHtml = '';
            for (const [key, layer] of Object.entries(data.primary_taxonomy)) {
                const stats = data.layer_statistics[key] || {};
                layersHtml += `
                    <div class="layer-item" onclick="showDetails('${key}', 'layer')">
                        <div class="layer-name">${key.replace('_', ' ').replace('network', 'Network (L3)').replace('transport', 'Transport (L4)').replace('session', 'Session (L5)').replace('presentation', 'Presentation (L6)').replace('protocols', 'Protocols (L7)')}</div>
                        <div class="layer-stats">${layer.nodes.length} issues | Critical: ${stats.by_severity?.critical || 0} | High: ${stats.by_severity?.high || 0}</div>
                    </div>
                `;
            }
            layersList.innerHTML = layersHtml;
            
            let domainsHtml = '';
            for (const [key, domain] of Object.entries(data.cross_cutting_domains)) {
                if (domain.nodes.length > 0) {
                    domainsHtml += `
                        <div class="domain-item" onclick="showDetails('${key}', 'domain')">
                            <div class="layer-name">${key.replace('_', ' ').replace('sdk', 'SDK')}</div>
                            <div class="layer-stats">${domain.nodes.length} issues | Critical: ${domain.nodes.filter(n => n.severity === 'critical').length} | High: ${domain.nodes.filter(n => n.severity === 'high').length}</div>
                        </div>
                    `;
                }
            }
            domainsList.innerHTML = domainsHtml;
        }

        function renderCharts(data) {
            const layerCtx = document.getElementById('layerChart').getContext('2d');
            const layerData = Object.entries(data.primary_taxonomy).map(([k, v]) => ({
                label: k.replace('L3_', 'L3 ').replace('L4_', 'L4 ').replace('L5_', 'L5 ').replace('L6_', 'L6 ').replace('L7_', 'L7 '),
                count: v.nodes.length
            }));
            
            new Chart(layerCtx, {
                type: 'bar',
                data: {
                    labels: layerData.map(d => d.label),
                    datasets: [{
                        label: 'Issues',
                        data: layerData.map(d => d.count),
                        backgroundColor: ['#06b6d4', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Severity distribution
            const allNodes = [];
            for (const layer of Object.values(data.primary_taxonomy)) {
                allNodes.push(...layer.nodes);
            }
            for (const domain of Object.values(data.cross_cutting_domains)) {
                allNodes.push(...domain.nodes);
            }
            
            const severityCounts = { critical: 0, high: 0, medium: 0, low: 0 };
            for (const node of allNodes) {
                if (severityCounts[node.severity] !== undefined) {
                    severityCounts[node.severity]++;
                }
            }

            const severityCtx = document.getElementById('severityChart').getContext('2d');
            new Chart(severityCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Critical', 'High', 'Medium', 'Low'],
                    datasets: [{
                        data: [severityCounts.critical, severityCounts.high, severityCounts.medium, severityCounts.low],
                        backgroundColor: ['#dc2626', '#ea580c', '#ca8a04', '#16a34a']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function renderDiagram() {
            const diagram = `graph TD
    subgraph LAYERS [OSI Layers]
        L3_network[Network (L3)<br/>(13 issues)]
        L4_transport[Transport (L4)<br/>(17 issues)]
        L5_session[Session (L5)<br/>(16 issues)]
        L6_presentation[Presentation (L6)<br/>(25 issues)]
        L7_protocols[Protocols (L7)<br/>(24 issues)]
    end

    subgraph CROSS_CUTTING [Cross-Cutting Concerns]
        security[Security<br/>(9 issues)]
        observability[Observability<br/>(11 issues)]
        testing[Testing<br/>(33 issues)]
        devops[Devops<br/>(10 issues)]
        wiring_di[Wiring (DI)<br/>(12 issues)]
        gateway_sdk[Gateway SDK<br/>(10 issues)]
    end

    L3_network --> L4_transport
    L4_transport --> L5_session
    L5_session --> L6_presentation
    L6_presentation --> L7_protocols`;
            document.getElementById('mermaid-diagram')..innerHTML = diagram;
        }

        window.showDetails = function(key, type) {
            fetch('architecture_taxonomy.json')
                .then(r => r.json())
                .then(data => {
                    const source = type === 'layer' ? data.primary_taxonomy[key] : data.cross_cutting_domains[key];
                    const panel = document.getElementById('node-details');
                    
                    panel.innerHTML = source.nodes.map((node, i) => `
                        <div class="node-item">
                            <strong>${node.id}</strong> ${node.title}
                            <span class="severity-badge severity-${node.severity}">${node.severity}</span>
                        </div>
                    `).join('');
                    
                    document.querySelector('.detail-panel h3').textContent = `Details: ${key.replace('_', ' ').replace('network', 'Network (L3)').replace('transport', 'Transport (L4)').replace('session', 'Session (L5)').replace('presentation', 'Presentation (L6)').replace('protocols', 'Protocols (L7)')}`;
                });
        };
    </script>
</body>
</html>
