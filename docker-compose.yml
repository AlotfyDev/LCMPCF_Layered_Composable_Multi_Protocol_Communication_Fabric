version: '3.8'

services:
  fabric-service:
    build: .
    container_name: fabric-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    volumes:
      - ./src:/app/src
    
  redis:
    image: redis:7-alpine
    container_name: fabric-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  redis-data: